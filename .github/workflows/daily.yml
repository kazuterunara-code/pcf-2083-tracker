name: Update PCF history (2083)

on:
  schedule:
    # 06:50 UTC = 15:50 JST（平日のみ）。毎時0分ちょうどはGitHub Actions全体が
    # 混雑し実行がスキップされやすいため、キリの悪い時刻にずらしています。
    - cron: "50 6 * * 1-5"
    # 07:20 UTC = 16:20 JST（平日のみ）。1回目がスキップされた場合の保険用。
    # 同じ日付のデータは自動的に上書きされるため、両方成功しても重複は発生しません。
    - cron: "20 7 * * 1-5"
  workflow_dispatch: {}
    # ↑ Actionsタブから「Run workflow」で手動実行できるようにするための設定（動作確認用）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest PCF and update history
        run: python scripts/fetch_and_update.py

      - name: Commit and push if changed
        run: |
          git config user.name "pcf-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update PCF history $(date -u +'%Y-%m-%d')"
            git push
          fi
